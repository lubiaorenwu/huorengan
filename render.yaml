services:
  - type: web
    name: huorengan-api
    env: python
    buildCommand: pip install -r requirements-server.txt
    startCommand: python server.py
    plan: free
    envVars:
      - key: DB_PATH
        value: /var/data/huorengan.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
